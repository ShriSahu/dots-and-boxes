<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="#f5f0e8"/>

  <!-- Top-left box filled (navy) -->
  <rect x="30" y="30" width="60" height="60" fill="rgba(26,58,107,0.22)" rx="4"/>
  <!-- Bottom-right box filled (crimson) -->
  <rect x="102" y="102" width="60" height="60" fill="rgba(139,26,26,0.22)" rx="4"/>

  <!-- Navy lines (top-left box border) -->
  <line x1="28" y1="28" x2="92" y2="28" stroke="#1a3a6b" stroke-width="7" stroke-linecap="round"/>
  <line x1="28" y1="92" x2="92" y2="92" stroke="#1a3a6b" stroke-width="7" stroke-linecap="round"/>
  <line x1="28" y1="28" x2="28" y2="92" stroke="#1a3a6b" stroke-width="7" stroke-linecap="round"/>
  <line x1="92" y1="28" x2="92" y2="92" stroke="#1a3a6b" stroke-width="7" stroke-linecap="round"/>

  <!-- Crimson lines (bottom-right box border) -->
  <line x1="100" y1="100" x2="164" y2="100" stroke="#8b1a1a" stroke-width="7" stroke-linecap="round"/>
  <line x1="100" y1="164" x2="164" y2="164" stroke="#8b1a1a" stroke-width="7" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="100" y2="164" stroke="#8b1a1a" stroke-width="7" stroke-linecap="round"/>
  <line x1="164" y1="100" x2="164" y2="164" stroke="#8b1a1a" stroke-width="7" stroke-linecap="round"/>

  <!-- Middle partial line (top-right, unfinished) -->
  <line x1="100" y1="28" x2="164" y2="28" stroke="#2a2418" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
  <!-- Middle partial line (bottom-left, unfinished) -->
  <line x1="28" y1="100" x2="28" y2="164" stroke="#2a2418" stroke-width="4" stroke-linecap="round" opacity="0.25"/>

  <!-- All 9 dots -->
  <circle cx="28"  cy="28"  r="7" fill="#2a2418"/>
  <circle cx="92"  cy="28"  r="7" fill="#2a2418"/>
  <circle cx="164" cy="28"  r="7" fill="#2a2418"/>
  <circle cx="28"  cy="92"  r="7" fill="#2a2418"/>
  <circle cx="92"  cy="92"  r="7" fill="#2a2418"/>
  <circle cx="164" cy="92"  r="7" fill="#2a2418"/>
  <circle cx="28"  cy="164" r="7" fill="#2a2418"/>
  <circle cx="92"  cy="164" r="7" fill="#2a2418"/>
  <circle cx="164" cy="164" r="7" fill="#2a2418"/>

  <!-- Initials in claimed boxes -->
  <text x="60" y="72" font-family="Georgia, serif" font-size="36" font-weight="bold"
        fill="#1a3a6b" text-anchor="middle">P</text>
  <text x="132" y="144" font-family="Georgia, serif" font-size="36" font-weight="bold"
        fill="#8b1a1a" text-anchor="middle">A</text>
</svg>
